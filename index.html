<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>CRM Lite — Startup Lead Management</title>
    <meta name="description" content="CRM Lite is a lightweight CRM for startups to track, qualify, and convert sales leads. Manage your pipeline, analyze performance, and close more deals." />
    <meta name="keywords" content="CRM, startup, lead management, sales pipeline, lead tracking" />
    <meta name="author" content="CRM Lite" />

    <!-- Open Graph / Social Meta -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CRM Lite — Startup Lead Management" />
    <meta property="og:description" content="A lightweight CRM for startups to track, qualify, and convert sales leads." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Inline theme initializer: prevents flash of wrong theme on page load -->
    <script>
      (function() {
        try {
          var raw = localStorage.getItem('startup-crm-theme');
          var isDark = raw !== null
            ? JSON.parse(raw)
            : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (isDark) document.documentElement.classList.add('dark');
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
